<!DOCTYPE html>
<html>

<head>
    <title>Spam Filter</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --bg-color: #f4f7f6;
            --card-bg: #ffffff;
            --text-main: #2d3436;
            --shadow-md: 0 10px 30px rgba(0, 0, 0, 0.1);
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-color);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            color: var(--text-main);
        }

        .container {
            background-color: var(--card-bg);
            padding: 40px;
            border-radius: 20px;
            box-shadow: var(--shadow-md);
            width: 450px;
            text-align: center;
        }

        h2 {
            margin-top: 0;
            font-weight: 800;
            font-size: 28px;
            background: var(--primary-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 30px;
        }

        textarea {
            width: 100%;
            height: 140px;
            margin-bottom: 20px;
            padding: 15px;
            border: 2px solid #eee;
            border-radius: 12px;
            box-sizing: border-box;
            font-family: inherit;
            resize: none;
            transition: border-color 0.3s;
        }

        textarea:focus {
            outline: none;
            border-color: #6c5ce7;
        }

        .btn-check,
        .btn-dashboard {
            width: 100%;
            color: white;
            padding: 14px;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            font-weight: 600;
            font-size: 16px;
            margin-bottom: 15px;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .btn-check {
            background: var(--primary-gradient);
            box-shadow: 0 4px 15px rgba(118, 75, 162, 0.3);
        }

        .btn-dashboard {
            background: white;
            color: #6c5ce7;
            border: 2px solid #6c5ce7;
            box-shadow: none;
        }

        .btn-secondary {
            width: 100%;
            background: white;
            color: #00b894;
            border: 2px solid #00b894;
            padding: 14px;
            border-radius: 50px;
            cursor: pointer;
            font-weight: 600;
            font-size: 16px;
            transition: all 0.2s;
        }

        .btn-secondary:hover {
            background: #e6fffa;
            transform: translateY(-2px);
        }

        .btn-check:hover,
        .btn-dashboard:hover {
            transform: translateY(-2px);
        }

        .btn-check:hover {
            box-shadow: 0 6px 20px rgba(118, 75, 162, 0.4);
        }

        .btn-dashboard:hover {
            background: #f8f6ff;
        }

        .result {
            margin-top: 25px;
            padding: 15px;
            border-radius: 12px;
            font-weight: 700;
            font-size: 18px;
        }

        .result.spam {
            background: rgba(255, 118, 117, 0.1);
            color: #d63031;
        }

        .result.not-spam {
            background: rgba(32, 191, 107, 0.1);
            color: #20bf6b;
        }

        .or-divider {
            color: #b2bec3;
            font-size: 14px;
            margin: 5px 0 20px 0;
            display: block;
        }
    </style>
</head>

<body>

    <div class="container">
        <h2>
            Email Spam Detection 
            <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none"
                stroke="url(#icon-gradient)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                style="vertical-align: middle; margin-left: 10px; margin-bottom: 4px;">
                <defs>
                    <linearGradient id="icon-gradient" x1="0" y1="0" x2="100%" y2="100%">
                        <stop offset="0%" stop-color="#667eea" />
                        <stop offset="100%" stop-color="#764ba2" />
                    </linearGradient>
                </defs>
                <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path>
                <polyline points="22,6 12,13 2,6"></polyline>
            </svg>
        </h2>

        <form action="/" method="POST">
            <textarea name="text" placeholder="Paste your email content here for analysis..."
                required>{{body}}</textarea>
            <input type="submit" value="Analyze Text" class="btn-check">
        </form>

        <span class="or-divider">— OR —</span>

        <div style="display: flex; gap: 15px; justify-content: center;">
            <form action="/check-recent" method="GET" style="flex: 1;">
                <input type="submit" value="Check Latest" class="btn-secondary">
            </form>

            <form action="/dashboard" method="GET" style="flex: 1;">
                <button type="submit" class="btn-dashboard" style="margin-bottom: 0;">Live Analysis</button>
            </form>
        </div>

        {% if result %}
        <div class="result {{ 'spam' if 'Spam' in result and 'Not' not in result else 'not-spam' }}">
            Analysis Result: {{ result }}
        </div>
        {% endif %}
    </div>

</body>

</html>
